<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RallyRushII</title>
    <meta name="description" content="RallyRushII, a standalone continuation of RallyRush.">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <audio id="gameMusic" src="assets/game.mp3" preload="auto" loop="true"></audio>
    <audio id="desertMusic" src="assets/desert.mp3" preload="auto"></audio>
    <audio id="alpineMusic" src="assets/alpine.mp3" preload="auto"></audio>
    <audio id="scotlandMusic" src="assets/scotland.mp3" preload="auto"></audio>
    

    <div id="ui" class="hud">
        <div class="hudTelemetry" aria-label="Race telemetry">
            <div class="hudBrand">RallyRushII</div>
            <div class="metric metricSpeed">
                <span class="metricLabel">Speed</span>
                <span class="metricReadout"><span id="speedValue">0</span><span class="metricUnit">km/h</span></span>
            </div>
            <div class="hudRule"></div>
            <div class="metric">
                <span class="metricLabel">Time</span>
                <span class="metricReadout"><span id="timerValue">0.00</span><span class="metricUnit">s</span></span>
            </div>
        </div>
    </div>
    <!-- Start Screen -->
    <div id="startScreen" class="screenOverlay">
        <div class="menuPanel">
            <div class="gameLogo" role="img" aria-label="RallyRushII logo">
                <img src="assets/game_logo.jpeg" alt="" aria-hidden="true" />
                <span class="gameLogoTitle">RallyRush<span>II</span></span>
            </div>
            <div class="menuCopy">
                <p class="eyebrow">Stage select</p>
                <h1>Choose your route</h1>
                <p>Telemetry online.</p>
            </div>
            <label class="selectLabel" for="circuitSelect">Circuit</label>
            <div class="selectShell">
                <select id="circuitSelect">
                    <option value="scotland">Scotland</option>
                    <option value="desert">Desert</option>
                    <option value="alpine">Alpine</option>
                </select>
            </div>
            <button id="startButton" class="primaryButton">Start race</button>
        </div>
    </div>

    <!-- End Screen -->
    <div id="endScreen" class="screenOverlay" style="display:none;">
        <div class="menuPanel endPanel">
            <div class="gameLogo compactLogo" role="img" aria-label="RallyRushII logo">
                <img src="assets/game_logo.jpeg" alt="" aria-hidden="true" />
                <span class="gameLogoTitle">RallyRush<span>II</span></span>
            </div>
            <div class="menuCopy">
                <p class="eyebrow">Stage complete</p>
                <h1>Game over</h1>
                <p id="finalTime" class="finalTime"></p>
            </div>
            <div id="scoreboard" class="scoreboard"></div>
            <div class="menuActions">
                <button id="restartButton" class="primaryButton">Restart</button>
                <button id="changeCircuitButton" class="secondaryButton">Change circuit</button>
            </div>
        </div>
    </div>
    <div id="mobileControls" aria-label="Driving controls">
        <div id="leftControls" class="pedalControls">
            <button id="accelerateButton" class="controlButton controlButtonPrimary">
                <span class="controlKey">RT</span>
                <span>Accelerate</span>
            </button>
            <button id="brakeButton" class="controlButton">
                <span class="controlKey">LT</span>
                <span>Brake</span>
            </button>
        </div>
        <div id="rightControls" class="steerControls">
            <button id="leftButton" class="controlButton">
                <span class="controlKey">L</span>
                <span>Left</span>
            </button>
            <button id="rightButton" class="controlButton">
                <span class="controlKey">R</span>
                <span>Right</span>
            </button>
        </div>
    </div>
    
    <script src="vendor/three.min.js"></script>
    <script src="vendor/GLTFLoader.js"></script>
    <script src="roadGenerator.js"></script>
    <script src="gameManager.js"></script>
    <script src="script.js"></script>
</body>

</html>
